plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // The core LangChain4j framework for AI control
    implementation 'dev.langchain4j:langchain4j:0.31.0'
    
    // The specific module to talk natively to the Ollama instance
    implementation 'dev.langchain4j:langchain4j-ollama:0.31.0'
    
    // A library to parse the JSON output that the LLM sends back
    implementation 'com.google.code.gson:gson:2.10.1'
    
    // Standard testing framework
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'llm.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
